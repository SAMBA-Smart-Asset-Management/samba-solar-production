name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/solar_production/manifest.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Manifest version: ${VERSION}"

      - name: Verify tag matches manifest version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          MANIFEST=${{ steps.version.outputs.version }}
          if [ "${TAG}" != "${MANIFEST}" ]; then
            echo "ERROR: Git tag (${TAG}) does not match manifest.json version (${MANIFEST})"
            exit 1
          fi
          echo "Version match confirmed: ${MANIFEST}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/solar_production/manifest.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          zip -r solar_production.zip custom_components/solar_production/

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            solar_production.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
