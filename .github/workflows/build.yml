name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'

# Required GitHub secrets:
#   ADDON_REPO_DEPLOY_TOKEN - classic PAT with `repo` scope on samba-addon-repo

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
            platform: linux/amd64

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | cut -d'"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            ADDON_VERSION=${{ steps.version.outputs.version }}
          tags: ghcr.io/samba-smart-asset-management/solar-production:${{ steps.version.outputs.version }}-${{ matrix.arch }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | cut -d'"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IMAGE=ghcr.io/samba-smart-asset-management/solar-production
          docker buildx imagetools create \
            --tag ${IMAGE}:${VERSION} \
            --tag ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64

  publish-addon-repo:
    name: Publish to samba-addon-repo (GitHub Pages)
    runs-on: ubuntu-latest
    needs: manifest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' config.yaml | cut -d'"' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Clone samba-addon-repo
        run: |
          git clone https://x-access-token:${{ secrets.ADDON_REPO_DEPLOY_TOKEN }}@github.com/SAMBA-Smart-Asset-Management/samba-addon-repo.git /tmp/addon-repo

      - name: Prepare addon metadata
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p /tmp/addon-repo/solar-production
          cp config.yaml /tmp/addon-repo/solar-production/config.yaml
          echo "image: ghcr.io/samba-smart-asset-management/solar-production" \
            >> /tmp/addon-repo/solar-production/config.yaml

      - name: Commit and push to samba-addon-repo
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd /tmp/addon-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Release solar-production v${VERSION}"
          git push
